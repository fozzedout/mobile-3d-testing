<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0b0d12" />
    <meta name="color-scheme" content="dark" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>3D Playground</title>
  </head>
  <body>
    <div id="app">
      <canvas id="scene" aria-label="3D test canvas"></canvas>

      <header id="topbar">
        <select id="scene-select" aria-label="Select test scene"></select>
        <span id="fps" aria-label="Frames per second">-- fps</span>
        <button id="gui-toggle" type="button" aria-label="Toggle controls panel">⚙</button>
        <button id="info-toggle" type="button" aria-label="Toggle device info">ⓘ</button>
        <button id="fullscreen-toggle" type="button" aria-label="Toggle fullscreen">⛶</button>
      </header>

      <div id="info-panel" hidden></div>
      <div id="drop-hint" hidden>Drop a .glb / .gltf file to load it</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
